<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Reproductor — Interactivo</title>
    <link rel="stylesheet" href="sis.css">
    <link rel="stylesheet" href="estilos-diagrama.css">
</head>
<body>

    

    <div class="page-wrap">
        <main class="diagram-card">
            <a href="index.html" class="back-btn" title="Volver" aria-label="Volver al índice">
               ❮ Regresar al Menú
            </a>
            <div id="svg-container" aria-label="Diagrama sistema digestivo"></div>
        </main>

      <aside class="info-card" id="info-card" aria-live="polite">
    <div class="info-meta">
        Sistema Reproductor 
        <button id="toggle-edit" style="float:right; background:none; border:1px solid #89c0bd; color:#89c0bd; cursor:pointer; border-radius:4px; font-size:0.7rem;">✏️ MODO EDICIÓN</button>
    </div>

    <div id="view-container">
        <h2 id="org-name">Selecciona un órgano</h2>
        <p id="org-desc">Haz clic en una parte del diagrama a la izquierda para ver su nombre y descripción aquí.</p>
        <div id="galeria-imagenes" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;"></div> </div>

    <div id="edit-container" style="display:none; margin-top:15px;">
       <form id="crud-form">
    <input type="hidden" id="edit-id-svg" name="id_svg">
    <input type="hidden" name="sistema" value="sistema_reproductivo">
    
    <label style="font-size:0.8rem; color:#89c0bd;">Nombre del Órgano:</label>
    <input type="text" id="input-nombre" name="nombre" style="width:100%; margin-bottom:10px; background:#071029; color:white; border:1px solid #2a3b4c;">
    
    <label style="font-size:0.8rem; color:#89c0bd;">Descripción General:</label>
    <textarea id="input-desc" name="descripcion" rows="3" style="width:100%; margin-bottom:10px; background:#071029; color:white; border:1px solid #2a3b4c;"></textarea>

    <label style="font-size:0.8rem; color:#89c0bd;">Archivos actuales (Clic para eliminar):</label>
    <div id="lista-archivos-edit" style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; padding: 5px; border: 1px dashed #2a3b4c;">
        </div>
    
    <hr style="border: 0; border-top: 1px solid #2a3b4c; margin-bottom: 10px;">

    <label style="font-size:0.8rem; color:#89c0bd;">✚ Añadir nuevo archivo (Opcional):</label>
    <input type="file" name="archivo" accept="image/*,video/*" style="font-size:0.8rem; margin-bottom:15px;">
    
    <button type="submit" style="width:100%; background:#89c0bd; color:#071029; font-weight:bold; border:none; padding:10px; cursor:pointer;">GUARDAR CAMBIOS</button>
</form>
    </div>
</aside>
    <div id="modal-visor" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;">
    <span id="cerrar-modal" style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;">&times;</span>
    <div id="contenedor-recurso-modal" style="max-width:90%; max-height:80%;">
        </div>
    <p id="caption-modal" style="color:white; margin-top:15px; font-family:sans-serif;"></p>
</div>

    <script src="svgloader.js" type="module"></script>
    <script type="module">
        import{cargarEInteractuar} from "/templates/svgloader.js"
        cargarEInteractuar("/assets/reproductivo.svg","sistema_reproductivo", 'svg-container')
    </script>
</body>
</html>
