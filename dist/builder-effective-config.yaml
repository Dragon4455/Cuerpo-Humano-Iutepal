directories:
  output: dist
  buildResources: build
appId: com.iutepal.anatomia
productName: Hombre de Vitruvio
files:
  - filter:
      - '**/*'
      - '!assets/db/anatomia_local.db'
      - '!assets/upload_images/**'
      - '!dist/**'
      - '!build/**'
      - '!*.md'
      - '!import.js'
      - '!update_urls.js'
      - '!import_organos_imagenes.js'
      - '!cambiar_password.js'
      - '!check_db.js'
      - '!import_descripciones.js'
      - '!verify_import.js'
extraResources:
  - from: assets/db/anatomia_local.db
    to: assets/db/anatomia_local.db
  - from: assets/upload_images/
    to: assets/upload_images/
win:
  target: nsis
  icon: static/logo.png
electronVersion: 41.0.1
